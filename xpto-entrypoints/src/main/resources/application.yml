spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: xpto-stream
  threads:
    virtual:
      enabled: true
  cloud:
    function:
      definition: userEventConsumer # EXATAMENTE o nome do seu @Bean
    stream:
      bindings:
        userEventConsumer-in-0:
          destination: user-events
          group: user-event-group
          content-type: application/json
      kafka:
        binder:
          brokers: localhost:9092
      aws:
        region:
          static: us-east-1
        credentials:
          access-key: "fakeMyKey"
          secret-key: "fakeMySecret"
        dynamodb:
          endpoint: http://localhost:8000

management:
  endpoints:
    web:
      exposure:
        include: '*'
